# GitHub Pages Configuration for Sphinx
title: finshare
description: 专业的金融数据获取工具库

# Build settings
remote_theme: sphinx-theme/readthedocs-doc-theme

# Exclude unnecessary files
exclude:
  - README.md
  - LICENSE
  - .gitignore
  - tests/
  - examples/
  - finshare/
  - setup.py
  - pyproject.toml

# Markdown support
markdown_extensions:
  - toc:
      permalink: true
  - tables
  - fenced_code

# Pagination
show_authors: true
